[project]
name = "metalmind-vault-rag"
version = "0.1.1"
description = "Obsidian vault RAG service for metalmind — MCP server, watcher, indexer, doctor."
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "qdrant-client>=1.9",
    "mcp>=1.0",
    "watchfiles>=0.22",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]
# `rerank` pulls torch (~700 MB). Opt-in — the default install stays slim.
# Users enable it via `uv tool install 'metalmind-vault-rag[rerank]'`.
rerank = [
    "FlagEmbedding>=1.3",
    # transformers 5.x removed XLMRobertaTokenizer.prepare_for_model, which
    # FlagEmbedding 1.3's reranker still calls — every rerank silently falls
    # back to embedder ordering. Pin below 5 until FlagEmbedding catches up.
    "transformers<5",
]

[project.scripts]
metalmind-vault-rag-server = "metalmind_vault_rag.server:main"
metalmind-vault-rag-watcher = "metalmind_vault_rag.watcher:main"
metalmind-vault-rag-indexer = "metalmind_vault_rag.indexer:main"
metalmind-vault-rag-doctor = "metalmind_vault_rag.doctor:main"
metalmind-vault-rag-http = "metalmind_vault_rag.http_server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["metalmind_vault_rag"]
